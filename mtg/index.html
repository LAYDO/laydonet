<!doctype html>
<html lang="en" class="theme-light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MTG | LaydoNet</title>
    <link rel="icon" href="/mtg/img/mtgIcon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v6.2.0/css/all.css" />
  </head>
  <body>
    <div class="laydo-overlay" id="laydoOverlay" aria-hidden="true"><div class="laydo-overlay-content"><a class="nav-link" data-shell-link href="/">LaydoNet</a><a class="nav-link" data-shell-link href="/weather/">Weather</a><a class="nav-link" data-shell-link href="/sports/">Sports</a><a class="nav-link" data-shell-link href="/jwst/">JWST</a><button class="nav-link fas fa-adjust" id="themeIcon" type="button" aria-label="Toggle theme"></button></div></div>
    <nav class="laydo-mobile-nav" id="laydoMNavbar" aria-label="Primary"><div class="laydo-nav-title" id="laydoNavTitle" role="link" tabindex="0" aria-label="LaydoNet home"><svg viewBox="0 14 100 24" aria-hidden="true"><path d="M5 20 C 5 30 5 30 15 30 C20 17 20 17 25 30 M19 26 L21 26" stroke-width="1" fill="none" /><path d="M25 20 Q 30 28 35 20 M30 24 L30 30" stroke-width="1" fill="none" /><path d="M35 20 L40 20 C 45 20 45 30 40 30 L35 30" stroke-width="1" fill="none" /><circle cx="50" cy="25" r="5" stroke-width="1" fill="none" /><path d="M65 30 L65 25 C65 18 75 18 75 25 L75 30 M85 30 L80 30 C75 30 75 20 80 20 L85 20 M80 25 L82 25 M86 20 L95 20 M90 20 L90 30" stroke-width="1" fill="none" /></svg></div><button id="laydoNavIcon" aria-label="Open menu" aria-expanded="false" type="button"><div class="bar1"></div><div class="bar2"></div><div class="bar3"></div></button></nav>
    <main class="laydo-page api-page" id="mtg-root">
      <section class="api-hero">
        <h1>MTG</h1>
        <p>Search Magic cards directly from the public Magic: The Gathering API.</p>
        <form class="form-row" data-mtg-form><input data-mtg-query aria-label="Card name" placeholder="Card name" /><button type="submit"><span class="fas fa-search"></span></button></form>
        <div class="pill-row"><button type="button" class="pill" data-mtg-chip="dragon">Dragon</button><button type="button" class="pill" data-mtg-chip="goblin">Goblin</button><button type="button" class="pill" data-mtg-chip="planeswalker">Planeswalker</button></div>
        <div class="eyebrow" data-mtg-status>Loading...</div>
      </section>
      <section class="photo-grid" data-mtg-results></section>
      <footer class="laydo-footer"><div class="sub-data">Card data provided by <a href="https://magicthegathering.io/">magicthegathering.io</a></div><div class="laydo-net-footer">Development by Landen Robinson</div><div class="laydo-net-footer"><span id="twitterIcon" class="fab fa-twitter socicon"></span><span id="linkedIcon" class="fab fa-linkedin-in socicon"></span><span id="githubIcon" class="fab fa-github socicon"></span></div></footer>
    </main>
    <script type="module" src="/src/main/mtg.ts"></script>
  </body>
</html>
