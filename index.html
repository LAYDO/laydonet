<!doctype html>
<html lang="en" class="theme-light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Web design and development for small businesses, weddings, portfolios, and API-powered apps." />
    <title>LaydoNet</title>
    <link rel="icon" href="/hex.svg" type="image/svg+xml" sizes="any" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v6.2.0/css/all.css" />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
  </head>
  <body>
    <div class="laydo-overlay" id="laydoOverlay" aria-hidden="true">
      <div class="laydo-overlay-content">
        <a class="nav-link" data-shell-link href="/">LaydoNet</a>
        <a class="nav-link" data-shell-link href="/about/">About</a>
        <a class="nav-link" data-shell-link href="/resume/">Resume</a>
        <a class="nav-link" data-shell-link href="/weather/">Weather</a>
        <a class="nav-link" data-shell-link href="/sports/">Sports</a>
        <a class="nav-link" data-shell-link href="/jwst/">JWST</a>
        <button class="nav-link fas fa-adjust" id="themeIcon" type="button" aria-label="Toggle theme"></button>
      </div>
    </div>

    <nav class="laydo-mobile-nav" id="laydoMNavbar" aria-label="Primary">
      <div class="laydo-nav-title" id="laydoNavTitle" role="link" tabindex="0" aria-label="LaydoNet home">
        <svg viewBox="0 14 100 24" aria-hidden="true">
          <path d="M5 20 C 5 30 5 30 15 30 C20 17 20 17 25 30 M19 26 L21 26" stroke-width="1" fill="none" />
          <path d="M25 20 Q 30 28 35 20 M30 24 L30 30" stroke-width="1" fill="none" />
          <path d="M35 20 L40 20 C 45 20 45 30 40 30 L35 30" stroke-width="1" fill="none" />
          <circle cx="50" cy="25" r="5" stroke-width="1" fill="none" />
          <path d="M65 30 L65 25 C65 18 75 18 75 25 L75 30 M85 30 L80 30 C75 30 75 20 80 20 L85 20 M80 25 L82 25 M86 20 L95 20 M90 20 L90 30" stroke-width="1" fill="none" />
        </svg>
      </div>
      <button id="laydoNavIcon" aria-label="Open menu" aria-expanded="false" type="button">
        <div class="bar1"></div>
        <div class="bar2"></div>
        <div class="bar3"></div>
      </button>
    </nav>

    <main class="laydo-page home-page">
      <section class="app-site-container" aria-label="API apps">
        <div class="apps-space">
          <div class="app-claim">
            <button class="app-button" id="sportsTile" type="button" data-home-link="/sports/" aria-label="Sports"></button>
            <h3 class="app-title">Sports</h3>
          </div>
          <div class="app-claim">
            <button class="app-button" id="trackissTile" type="button" data-home-link="/trackiss/" aria-label="ISS tracker"></button>
            <h3 class="app-title">Orbiter</h3>
          </div>
          <div class="app-claim">
            <button class="app-button" id="jwstTile" type="button" data-home-link="/jwst/" aria-label="JWST"></button>
            <h3 class="app-title">JWST</h3>
          </div>
          <div class="app-claim">
            <button class="app-button" id="weatherTile" type="button" data-home-link="/weather/" aria-label="Weather"></button>
            <h3 class="app-title">Weather</h3>
          </div>
          <div class="app-claim">
            <button class="app-button" id="mtgTile" type="button" data-home-link="/mtg/" aria-label="MTG"></button>
            <h3 class="app-title">MTG</h3>
          </div>
          <div class="app-claim">
            <button class="app-button" id="webglTile" type="button" data-home-link="/webgl/" aria-label="WebGL"></button>
            <h3 class="app-title">WebGL</h3>
          </div>
        </div>
        <div class="site-space">
          <div class="site-claim">
            <div class="site-div" id="apollosarcade" data-home-link="https://www.apollosarcade.com" role="link" tabindex="0" aria-label="Apollo's Arcade"></div>
            <h3 class="site-title">Apollo's Arcade</h3>
          </div>
          <div class="site-claim">
            <div class="site-div" id="weddingTile" data-home-link="/wedding/" role="link" tabindex="0" aria-label="Wedding"></div>
            <h3 class="site-title">Wedding</h3>
          </div>
        </div>
        <div class="material-icons" id="laydoArrowDown">keyboard_arrow_down</div>
      </section>

      <section class="hero-center home-hero-copy" aria-label="Introduction">
        <p class="hero-kicker">Crafting</p>
        <h1 class="hero-title">Digital<br />Experiences</h1>
      </section>

      <footer class="laydo-footer">
        <div class="laydo-net-footer">Development by Landen Robinson</div>
        <div class="laydo-net-footer">
          <span id="twitterIcon" class="fab fa-twitter socicon"></span>
          <span id="linkedIcon" class="fab fa-linkedin-in socicon"></span>
          <span id="githubIcon" class="fab fa-github socicon"></span>
        </div>
      </footer>
    </main>

    <script type="module" src="/src/main/home.ts"></script>
  </body>
</html>
